<!DOCTYPE html>
<html>
<head>
<style>
.container {
  width: 600px;
  height: 600px;
  display: flex;
  
  background-color: DodgerBlue;
}

.container div {
  background-color: #f1f1f1;
  margin: 10px;
  padding: 20px;
  font-size: 24px;
}
</style>
</head>
<body>

<h1>Create a Flex Container</h1>

<div class="container">
    <div>元素 1</div>
    <div>元素 2</div>
    <div>元素 3</div>
    <div>元素 4</div>
    <div>元素 5</div>
    <div>元素 6</div> 
    <div>元素 7</div>
    <div>元素 8</div>
    <div>元素 9</div> 
</div>
</body>
</html>
