  	<h1> RickRoll 是什麼 </h1>
    <p> 瑞克搖，是一種惡作劇和網路迷因，主要與瑞克·艾斯里於1987年發行的歌曲 <span style = "color: red">《永不放棄你》</span> 的音樂影片有關。 該現象屬於網路惡搞文化。藉由聳動標題吸引觀眾點進去，卻只見《永不放棄你》的音樂錄影帶和舞動的歌手或者是在影片中插入該MV片段，而這個行為稱為「Rickrolled」，意思為瑞克搖了。 </p>
