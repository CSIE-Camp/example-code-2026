<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: #e1b941;
            width: 200px;
            height: 150px;
            text-align: center;
            margin: 20px auto 20px auto;
        }

        .content{
            background-color: yellow;
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <div class = "box" style = "padding: 45px;">
        <div class = "content">
        </div>
    </div>
    <div class = "box">
        <div class = "content" style = "border: 5px solid black; border-radius:4px;">
        </div>
    </div>
    <div class = "box">
        <div class = "content" style = "margin: auto;">
        </div>
    </div>
</body>
</html>
