    <h1>對不起教授</h1>
    <p>
        【道歉啟事】
        <br>
        本人在此向程式設計致上萬分歉意。
        本人在期中考前：
        <ul>
            <li>用<b>極其輕佻的態度</b>看待期中考</li>
            <li>態度<b>輕浮</b>且行為<b>囂張</b></li>
            <li>複習的時候<b>對所有語法、細節都很不尊重</b></li>
        </ul>
        導致在考試中只會寫送分題。
        <br>
        對此我本人感到無比懊悔。在此我必須鄭重跟程式設計及教授道歉。對不起，我錯了。我承諾將從這次錯誤中學習，往後面對程式設計會盡全力學習，避免踏上重修這條不歸路。希望各位心地善良且認真的教授們不要把我當掉。
        <hr>
        <s>希望沒有教授來觀摩這堂課</s>
    </p>
